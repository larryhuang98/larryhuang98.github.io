bio: |
  Zhen Huang is a Ph.D. candidate in computational chemistry at the University of
  California, Irvine, advised by Prof. Ray Luo. His research develops Gaussian-density
  force fields — the polarizable Gaussian multipole (PGM) model, the DEGauss softcore
  potential, and a self-consistent Gaussian van der Waals (GVDW) term — and their
  GPU implementation in the AMBER molecular dynamics package.

