bio: |
  Zhen Huang is a Ph.D. candidate in computational chemistry at the University of
  California, Irvine, advised by Prof. Ray Luo, and a core developer of the AMBER
  molecular dynamics package. His work centers on force-field development and
  high-performance scientific software: the polarizable Gaussian multipole (pGM)
  model, the DEGauss softcore potential, and a self-consistent Gaussian van der
  Waals (GVDW) term, together with their MPI and CUDA implementation in AMBER. He
  also works on free-energy calculations and machine-learning potentials for drug
  discovery and biomolecular systems.

